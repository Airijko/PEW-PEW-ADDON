# EndlessLevelingAddon - Dungeon Gate configuration

# Master switch. Set to false to completely disable dungeon gate spawning.
enabled: true

# -----------------------------------------------------------------------
# Spawning
# -----------------------------------------------------------------------

# How frequently (in minutes) a new dungeon gate can naturally spawn.
# Each spawn cycle picks a random value between min and max (inclusive).
# Minimum enforced value: 1.
spawn_interval_minutes_min: 25
spawn_interval_minutes_max: 40

# Maximum number of dungeon gate instances that may be active at the same time.
# Set to -1 for no limit.
max_concurrent_spawns: 5

# World names allowed to summon/spawn dungeon portals.
# Natural spawning and manual gate summon commands both respect this list.
portal_world_whitelist:
  - world
  - default
  - endless

# Announce in global chat when a dungeon gate spawns.
announce_on_spawn: true

# Announce in global chat when a dungeon gate despawns.
announce_on_despawn: true

# -----------------------------------------------------------------------
# Gate lifetime
# -----------------------------------------------------------------------

# How long (in minutes) an open gate stays active before it closes on its own.
# Minimum enforced value: 1. Set to -1 to never auto-close.
gate_duration_minutes: 45

# -----------------------------------------------------------------------
# Entry restrictions
# -----------------------------------------------------------------------

# Whether players who die inside a dungeon instance are allowed to re-enter it.
# false = locked out for that run (recommended for challenge content).
allow_reentry_after_death: false

# Maximum number of players allowed inside one gate instance at a time.
# Set to -1 for no limit.
max_players_per_instance: -1

# Minimum player level required to enter a gate.
# Set to 1 to allow everyone.
min_level_required: 1

# -----------------------------------------------------------------------
# Dynamic level targeting
# -----------------------------------------------------------------------

# Rank gates scale from level 1 up to the highest player level ever seen.
# Each rank occupies a 20% slice of that span and picks a random anchor
# within its slice on every spawn, giving a wide variety of mob levels:
#
#   E  ->  0% .. 20%   (easiest)   example at highest=100: mobs roughly  1-20
#   D  -> 20% .. 40%               example at highest=100: mobs roughly 20-40
#   C  -> 40% .. 60%               example at highest=100: mobs roughly 40-60
#   B  -> 60% .. 80%               example at highest=100: mobs roughly 60-80
#   A  -> 80% ..100%               example at highest=100: mobs roughly 80-100
#   S  -> 100%+ offset  (hardest)  example at highest=100: mobs roughly 110-130

# S-rank random offset range added above the highest player level.
# Example: highest=100 and rolled offset=17 => normal mob minimum starts at 117.
# Minimum enforced value: 0.
level_offset_min: 10
level_offset_max: 30

# Normal mob level spread size for the gate (inclusive range).
# The anchor is the MINIMUM mob level; the max is anchor + this value.
# Example: 20 with anchor 40 => normal mobs are 40-60.
# Minimum enforced value: 0.
normal_mob_level_range: 20

# Boss bonus added on top of the highest normal mob level.
# Example: normal 60-80 with boss bonus 10 => boss is level 90.
# Minimum enforced value: 0.
boss_level_bonus: 10

# Which players are considered when determining the highest-level player ceiling.
# online  = only players currently online (high-water mark: remembered until restart).
# overall = all players ever seen (online and offline data).
level_player_scope: overall

# Which mob level acts as the tier anchor when placing a rank in the player band.
# lowest_mob  = the lowest normal mob level is the anchor (range grows upward).
# highest_mob = the highest normal mob level is the anchor (range grows downward).
# boss        = the boss level is the anchor (normal range is derived below it).
rank_anchor_mode: highest_mob

# -----------------------------------------------------------------------
# Rank weighting
# -----------------------------------------------------------------------

# Weighted chance used when rolling a gate rank.
# Values are relative weights (not required to sum to 100).
# Example with defaults: S=1, A=6, B=13, C=30, D=25, E=25.
# Effective chance = tier_weight / total_weight.
rank_weights:
  S: 1
  A: 6
  B: 13
  C: 30
  D: 25
  E: 25
