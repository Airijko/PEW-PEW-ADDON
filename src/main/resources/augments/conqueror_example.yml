id: conqueror_example
name: "Conqueror_Example"
enabled: true
tier: MYTHIC
description: "Example custom augment based on Conqueror. Sustained combat builds momentum, increasing your damage. At full stacks your attacks pierce defenses with true damage."
category: ON_HIT

passives:
  buffs:
    bonus_damage:
      value: 0.05 # +5% bonus damage per stack
    max_stacks: 8

  max_stack_bonus:
    bonus_true_damage:
      value: 25.0 # Flat true damage added to each hit
      true_damage_percent: 0.15 # +15% of damage dealt is added as bonus true damage at max stacks

  duration:
    seconds: 8 # Seconds after hitting a target to maintain stacks, refreshing on each hit

