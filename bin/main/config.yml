# EndlessLevelingAddon configuration

# True = merge Endless Leveling Core defaults with your custom content.
# False = fresh start for that system (Core defaults are not merged in by this addon workflow).
core_content_merge:
  races: true
  classes: true
  augments: true
  passives: true

# Addon updates are always migration-only and never force overwrite your files.

# Master logging toggle:
# true  = shows all addon log levels
# false = only shows logging.base_level and higher
enable_logging: false

logging:
  # Base level for addon logs. Supported values: SEVERE, WARNING, INFO, FINE
  # Only used when enable_logging is false.
  base_level: WARNING

examples:
  # Master switch for all Java example features in this addon.
  enabled: false

  # Toggle /example command registration + execution.
  command: false

  # Toggle example event hooks (e.g. player ready welcome message).
  events: false

